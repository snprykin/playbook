---
# tasks file for lighthouse-role
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - git
      - nginx
      - nodejs
      - npm
    state: present
    update_cache: true
  become: true

- name: Ensure nginx is running
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  become: true

- name: Create lighthouse user and group
  ansible.builtin.user:
    name: "{{ lighthouse_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Clone Lighthouse repository
  ansible.builtin.git:
    repo: "{{ lighthouse_repo_url }}"
    dest: "{{ lighthouse_install_dir }}"
    version: "{{ lighthouse_version }}"
    force: true
  become: true

- name: Install npm dependencies
  community.general.npm:
    path: "{{ lighthouse_install_dir }}"
    state: present
  become: true

- name: Set permissions
  ansible.builtin.file:
    path: "{{ lighthouse_install_dir }}"
    owner: "{{ lighthouse_user }}"
    group: "{{ lighthouse_group }}"
    recurse: true
  become: true

- name: Deploy Nginx config
  ansible.builtin.template:
    src: lighthouse.conf.j2
    dest: "{{ lighthouse_nginx_config }}"
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx
  become: true

- name: Enable site
  ansible.builtin.file:
    src: "{{ lighthouse_nginx_config }}"
    dest: "{{ lighthouse_nginx_enabled }}"
    state: link
  become: true
  notify: restart nginx

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: restart nginx
